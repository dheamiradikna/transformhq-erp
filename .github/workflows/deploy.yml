# =====================================================================
# TransformHQ ERP — GitHub Actions CI/CD
# Deploy otomatis ke Azure App Service setiap push ke branch main
#
# Setup yang dibutuhkan sebelum workflow ini bisa jalan:
# 1. Buat Azure App Service (Windows, .NET Framework 4.8)
# 2. Di Azure Portal: App Service → Deployment Center → Get Publish Profile
#    → Copy isi file .PublishSettings
# 3. Di GitHub: Settings → Secrets and variables → Actions → New secret
#    Nama: AZURE_WEBAPP_PUBLISH_PROFILE
#    Value: paste isi file .PublishSettings tadi
# 4. Ganti nilai AZURE_WEBAPP_NAME di bawah dengan nama App Service kamu
# =====================================================================

name: Deploy ke Azure App Service

on:
  push:
    branches:
      - main          # Deploy otomatis saat push ke main
  workflow_dispatch:  # Bisa juga trigger manual dari tab Actions di GitHub

env:
  AZURE_WEBAPP_NAME: transformhq-erp       # ← Ganti dengan nama App Service kamu
  SOLUTION_FILE: ERP_JasaKonsultasi.sln
  BUILD_CONFIGURATION: Release

jobs:
  build-and-test:
    name: Build
    runs-on: windows-latest               # WAJIB windows karena .NET Framework 4.8

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          msbuild-architecture: x64

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2
        with:
          nuget-version: latest

      - name: Restore NuGet packages
        run: nuget restore ${{ env.SOLUTION_FILE }}

      - name: Build Solution
        run: |
          msbuild ${{ env.SOLUTION_FILE }} `
            /p:Configuration=${{ env.BUILD_CONFIGURATION }} `
            /p:Platform="Any CPU" `
            /p:DeployOnBuild=true `
            /p:WebPublishMethod=FileSystem `
            /p:PublishUrl="${{ github.workspace }}\publish" `
            /p:DeleteExistingFiles=True

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp-build
          path: ${{ github.workspace }}\publish\
          retention-days: 1

  deploy:
    name: Deploy ke Azure
    needs: build-and-test
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp-build
          path: ./publish

      - name: Deploy ke Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish
